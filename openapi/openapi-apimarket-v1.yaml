  '/subscriptions/webhook/{subjectType}/{subjectId}':
    post:
      tags:
        - Flight Alert API
      summary: Create web-hook subscription / TIER 4
      description: "*This endpoitns is a part of Flight alert PUSH API currently powered by webhooks.  \nIf you are running your own web service, you can subscribe to flights by number or airport code. \nAfter that, your HTTP endpoint will be called (notified) whenever the flight information gets \nupdated.*\n\nCreates a web-hook subscription on a subject (e.g., flight alerts by number or by airport code).\nReturns information about created subscription. Subscription ID contained in it\ncan be used to refresh or remove it.\n\nEvery time a subject gets updated, a HTTP request will be sent to\nthe URL specified in `url` parameter. Request will be of a POST type \nand contain JSON-formatted `FlightNotificationContract` object containing subscription\nand flights information in  the body (see example response for status code 199\nof this endpoint documentation).\n\nAll flight alerts / notifications are delivered in best-effort manner. They might be missing\nor delayed. If there was an error delivering a notification for any reason, for example, your\nendpoint was not available, returned non-2xx status code, or did not respond within timeout period,\nthere will be 2 more retries after 5 and 15 minutes (**this behavior is changing, see below**).\n\nIf subscribed to a specific flight or to flights operated in a specific airport:\n* Ensure that the flight is within the live updates / ADS-B data coverage. There is no sense in subscribing to a flight which operates in airports having poor or  no live updates or ADS-B coverage: there simply will be no updates. To check if an airport is tracked and on which level, use `/health/services/airports/{icao}/feeds` endpoint. You can also use `/health/services/feeds/{service}/airports` to get the list of covered airports. Read more about coverage here: https://www.aerodatabox.com/data-coverage.\n* Notifications will cover updates for flights commencing from 6 hours ago up to 72 hours in future.\n* Among these, notifications will contain only those flight items which were actually updated this time.\n\n** ! WARNING OF THE UPCOMING BREAKING CHANGES ! **\n\nWE ARE CHANGING HOW WEB-HOOK SUBSCRIPTION BILLING AND NOTIFICATION RETRY IS HANDLED. \n\nIf you're already using Flight Alert API you need to adjust your code to prevent service interruption.\n\n**CURRENT BEHAVIOR (BEING PHASED OUT):**\n\n* Web-hook subscriptions created using this endpoint have a life-time of 7 days. Expiration date-time is provided in the response to this endpoint. \n* After that expiration date the subscription will be removed automatically. If you want to prevent expiration and extend the subscription, use `PATCH /webhook/{subscriptionId}/refresh` endpoint to refresh the subscription. You may also remove the subscription manually using DELETE `webhook/{subscriptionId}`.\n* As long as a web-hook subscription is active, you will receive notifications if there are any.\n* You are billed for every call when you create or refresh a subscription as per Tier 4 API quota.\n* You are **not** billed for the amount of notifications generated or delivered to you.\n* You may **not** be refunded for unused time on your subscription if you remove it manually before expiration or if there were no notifications.\n* Each failed notification delivery attempt is retried 2 times by default, regardless of the reason of failure.\n\n**UPCOMING BEHAVIOR:**\n\n* Web-hook subscriptions no longer expire, unless you remove them manually.\n* This endpoint is moved to the Free Tier and both creating and refreshing subscriptions will be free of charge.\n* Every API consumer will now have a dedicated flight alert credit balance separate from the API quota. \n* Credits are deducted from your balance each time an alert notification is sent to your webhook. The cost is 1 credit per flight item in the notification. If a notification contains 1 flight, it costs 1 credit. If a notification contains 5 flights (common with airport subscriptions), it costs 5 credits.\n* Use caution when subscribing to an airport with a lot of traffic, as it may drain your balance quickly.\n* As soon as your balance reaches zero, all your web-hook subscriptions will pause and no notifications will be sent until you refill your balance.The balance is shared among all web-hook subscriptions created by you.\n* To refill the balance, refer to `POST /subscriptions/balance/refill` API endpoint.\n* To check the balance, refer to `GET /subscriptions/balance` endpoint.\n* `PATCH /webhook/{subscriptionId}/refresh` is now deprecated will be removed after the transition period. Pricing Tier 4 will be discontinued too.\n* Each failed notification delivery attempt is not retried by default, unless you explicitly set amount of retries when creating the subscription using `maxDeliveryRetries` parameter in the request body.\n* Each retry attempt costs the same amount of credits as the original notification delivery attempt.\n\n**WHEN THE CHANGE WILL HAPPEN?**\n\n* Transition period will end on **the 4th of April, 2026**. Both systems will co-exist during the transition period until then. After that date only the credit-based billing system will remain operational. \n\n**MIGRATION GUIDE / LEARN MORE**\n\nRead our guide at https://aerodatabox.com/flight-alert-api-2026/"
      operationId: SubscribeWebhook
      parameters:
        - name: subjectType
          in: path
          description: Subject type
          schema:
            $ref: '#/components/schemas/SubscriptionSubjectType'
        - name: subjectId
          in: path
          description: "Subject ID. If `subjectType` is: \n* `FlightByNumber`, then this field must be a flight number (with or without spaces, IATA or ICAO, any case formats are acceptable, e.g. KL1395, Klm 1395);\n* `FlightByAirportIcao`, then this field must be a 4-character ICAO-code of the airport where flights are operated (e.g.: EHAM, KLAX, UUEE, etc.);"
          required: true
          schema:
            type: string
        - name: useCredits
          in: query
          description: "THIS IS A TEMPORARY MIGRATION PARAMETER FOR EASIER TRANSITION. \nDefault value: false.\nSet to true to create a web-hook subscription under the new, credit-based billing model.In this case, the call will be free of charge despite Tier 4.\nAfter transition this parameter will be ignored as all subscriptions will be created as credit-based and you will be able to remove it."
          schema:
            type: boolean
            default: false
      requestBody:
        description: Command containing parameters for web-hook subscription creation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebHookSubscription'
      responses:
        '204':
          description: No Content
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorContract'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorContract'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorContract'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorContract'
        '451':
          description: Unavailable For Legal Reasons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorContract'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorContract'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorContract'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorContract'
        '503':
          description: Service Unavailable
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionContract'
            application/xml:
              schema:
                $ref: '#/components/schemas/SubscriptionContract'
        '199':
          description: Information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightNotificationContract'
            application/xml:
              schema:
                $ref: '#/components/schemas/FlightNotificationContract'
      x-badges:
        - name: TIER 4
          position: before
          color: '#8a8eb2'
