          description: Weather phenomena groups
          nullable: true
        validFrom:
          $ref: '#/components/schemas/DateTimeContract'
        validTo:
          $ref: '#/components/schemas/DateTimeContract'
      additionalProperties: false
      description: "Weather record contract describing the weather situation\nat a specific time and place"
    WindContract:
