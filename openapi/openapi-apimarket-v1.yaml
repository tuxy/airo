          maximum: 2147483647
          minimum: 1
          type: integer
          description: Number of credits to add to the notification subscription balance.
          format: int32
      additionalProperties: false
      description: Represents a contract for refilling flight alert credits on a subscription.
    SurfaceType:
      enum:
